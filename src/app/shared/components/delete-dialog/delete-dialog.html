<h2 mat-dialog-title class="delete-dialog__title">
  <mat-icon color="warn">warning</mat-icon>
  {{ data.title }}
</h2>

<mat-dialog-content>
  Are you sure you want to delete <strong>{{ data.itemLabel }}</strong>? This action cannot be
  undone.
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">Cancel</button>
  <button mat-flat-button type="button" color="warn" (click)="confirm()">Delete</button>
</mat-dialog-actions>
