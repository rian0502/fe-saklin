<div class="data-table">
  @if (loading()) {
    <mat-progress-bar mode="indeterminate" class="data-table__progress" />
  }

  <table mat-table [dataSource]="data()">
    @for (column of columns(); track column.key) {
      <ng-container [matColumnDef]="column.key">
        <th mat-header-cell *matHeaderCellDef>
          @if (column.sortable) {
            <button type="button" class="data-table__sort-button" (click)="toggleSort(column)">
              {{ column.label }}
              @if (sortState()?.field === column.key) {
                <mat-icon>
                  {{ sortState()!.direction === 'asc' ? 'arrow_upward' : 'arrow_downward' }}
                </mat-icon>
              }
            </button>
          } @else {
            {{ column.label }}
          }
        </th>
        <td mat-cell *matCellDef="let row">{{ column.cell(row) }}</td>
      </ng-container>
    }

    @if (rowActionsTemplate()) {
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let row">
          <ng-container *ngTemplateOutlet="rowActionsTemplate()!; context: { $implicit: row }" />
        </td>
      </ng-container>
    }

    <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
  </table>
</div>
