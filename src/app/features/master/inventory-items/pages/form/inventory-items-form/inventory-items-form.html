<app-page-header title="Inventory Item" subtitle="Inventory item details" />

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="master-form">
  <mat-form-field appearance="outline">
    <mat-label>Name</mat-label>
    <input matInput formControlName="name" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>SKU</mat-label>
    <input matInput formControlName="sku" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Unit</mat-label>
    <input matInput formControlName="unit" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Quantity</mat-label>
    <input matInput type="number" formControlName="quantity" />
  </mat-form-field>

  <div class="master-form__actions">
    <button mat-button type="button" routerLink="..">Cancel</button>
    <button mat-flat-button color="primary" type="submit">Save</button>
  </div>
</form>
