<app-page-header title="Inventory Items" subtitle="Manage consumable and stock item definitions">
  <a pageHeaderActions mat-flat-button color="primary" routerLink="new">
    <mat-icon>add</mat-icon>
    Add Inventory Item
  </a>
</app-page-header>

<div class="inventory-items-list__toolbar">
  <app-search-box placeholder="Search inventory items..." (searchChange)="onSearchChange($event)" />
</div>

<app-filter-panel [fields]="filterFields" (filtersChange)="onFiltersChange($event)" />

<app-data-table
  [columns]="columns"
  [data]="items()"
  [loading]="loading()"
  [sortState]="sort()"
  (sortChange)="onSortChange($event)"
>
  <ng-template #rowActions let-row>
    <a mat-icon-button [routerLink]="[row.id, 'edit']" aria-label="Edit inventory item">
      <mat-icon>edit</mat-icon>
    </a>
    <button
      mat-icon-button
      color="warn"
      type="button"
      aria-label="Delete inventory item"
      (click)="deleteInventoryItem(row)"
    >
      <mat-icon>delete</mat-icon>
    </button>
  </ng-template>
</app-data-table>

@if (!loading() && items().length === 0) {
  <app-empty-state
    icon="inventory_2"
    title="No inventory items found"
    description="Try adjusting your search or filters, or add a new inventory item."
  />
}

<app-paginator [length]="length()" [page]="page()" [perPage]="perPage()" (pageChange)="onPageChange($event)" />
