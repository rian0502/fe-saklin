<app-page-header title="Services" subtitle="Manage your laundry service catalog">
  <a pageHeaderActions mat-flat-button color="primary" routerLink="new">
    <mat-icon>add</mat-icon>
    Add Service
  </a>
</app-page-header>

@if (loading()) {
  <app-loading message="Loading services..." />
} @else if (items().length === 0) {
  <app-empty-state
    icon="local_laundry_service"
    title="No services yet"
    description="Services you add will appear here."
  />
} @else {
  <table mat-table [dataSource]="items()">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <ng-container matColumnDef="price">
      <th mat-header-cell *matHeaderCellDef>Price</th>
      <td mat-cell *matCellDef="let row">{{ row.price }}</td>
    </ng-container>

    <ng-container matColumnDef="durationMinutes">
      <th mat-header-cell *matHeaderCellDef>Duration (min)</th>
      <td mat-cell *matCellDef="let row">{{ row.durationMinutes }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
}
