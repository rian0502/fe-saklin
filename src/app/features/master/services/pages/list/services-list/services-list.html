<app-page-header title="Services" subtitle="Manage your laundry service catalog">
  <a pageHeaderActions mat-flat-button color="primary" routerLink="new">
    <mat-icon>add</mat-icon>
    Add Service
  </a>
</app-page-header>

<div class="services-list__toolbar">
  <app-search-box placeholder="Search services..." (searchChange)="onSearchChange($event)" />
</div>

<app-data-table
  [columns]="columns"
  [data]="items()"
  [loading]="loading()"
  [sortState]="sort()"
  (sortChange)="onSortChange($event)"
>
  <ng-template #rowActions let-row>
    <a mat-icon-button [routerLink]="[row.id, 'edit']" aria-label="Edit service">
      <mat-icon>edit</mat-icon>
    </a>
    <button
      mat-icon-button
      color="warn"
      type="button"
      aria-label="Delete service"
      (click)="deleteService(row)"
    >
      <mat-icon>delete</mat-icon>
    </button>
  </ng-template>
</app-data-table>

@if (!loading() && items().length === 0) {
  <app-empty-state
    icon="local_laundry_service"
    title="No services found"
    description="Try adjusting your search, or add a new service."
  />
}

<app-paginator [length]="length()" [page]="page()" [perPage]="perPage()" (pageChange)="onPageChange($event)" />
