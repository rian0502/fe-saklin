<app-page-header title="Promotions" subtitle="Manage discount campaigns">
  <a pageHeaderActions mat-flat-button color="primary" routerLink="new">
    <mat-icon>add</mat-icon>
    Add Promotion
  </a>
</app-page-header>

@if (loading()) {
  <app-loading message="Loading promotions..." />
} @else if (items().length === 0) {
  <app-empty-state
    icon="sell"
    title="No promotions yet"
    description="Promotions you add will appear here."
  />
} @else {
  <table mat-table [dataSource]="items()">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let row">{{ row.code }}</td>
    </ng-container>

    <ng-container matColumnDef="discountPercentage">
      <th mat-header-cell *matHeaderCellDef>Discount (%)</th>
      <td mat-cell *matCellDef="let row">{{ row.discountPercentage }}</td>
    </ng-container>

    <ng-container matColumnDef="startDate">
      <th mat-header-cell *matHeaderCellDef>Start Date</th>
      <td mat-cell *matCellDef="let row">{{ row.startDate }}</td>
    </ng-container>

    <ng-container matColumnDef="endDate">
      <th mat-header-cell *matHeaderCellDef>End Date</th>
      <td mat-cell *matCellDef="let row">{{ row.endDate }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
}
