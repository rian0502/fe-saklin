<app-page-header title="Promotions" subtitle="Manage discount campaigns">
  <a pageHeaderActions mat-flat-button color="primary" routerLink="new">
    <mat-icon>add</mat-icon>
    Add Promotion
  </a>
</app-page-header>

<div class="promotions-list__toolbar">
  <app-search-box placeholder="Search promotions..." (searchChange)="onSearchChange($event)" />
</div>

<app-filter-panel [fields]="filterFields" (filtersChange)="onFiltersChange($event)" />

<app-data-table
  [columns]="columns"
  [data]="items()"
  [loading]="loading()"
  [sortState]="sort()"
  (sortChange)="onSortChange($event)"
>
  <ng-template #rowActions let-row>
    <a mat-icon-button [routerLink]="[row.id, 'edit']" aria-label="Edit promotion">
      <mat-icon>edit</mat-icon>
    </a>
    <button
      mat-icon-button
      color="warn"
      type="button"
      aria-label="Delete promotion"
      (click)="deletePromotion(row)"
    >
      <mat-icon>delete</mat-icon>
    </button>
  </ng-template>
</app-data-table>

@if (!loading() && items().length === 0) {
  <app-empty-state
    icon="sell"
    title="No promotions found"
    description="Try adjusting your search or filters, or add a new promotion."
  />
}

<app-paginator [length]="length()" [page]="page()" [perPage]="perPage()" (pageChange)="onPageChange($event)" />
