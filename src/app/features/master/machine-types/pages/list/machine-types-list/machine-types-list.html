<app-page-header title="Machine Types" subtitle="Manage machine type definitions">
  <a pageHeaderActions mat-flat-button color="primary" routerLink="new">
    <mat-icon>add</mat-icon>
    Add Machine Type
  </a>
</app-page-header>

@if (loading()) {
  <app-loading message="Loading machine types..." />
} @else if (items().length === 0) {
  <app-empty-state
    icon="category"
    title="No machine types yet"
    description="Machine types you add will appear here."
  />
} @else {
  <table mat-table [dataSource]="items()">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let row">{{ row.name }}</td>
    </ng-container>

    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef>Description</th>
      <td mat-cell *matCellDef="let row">{{ row.description }}</td>
    </ng-container>

    <ng-container matColumnDef="capacityKg">
      <th mat-header-cell *matHeaderCellDef>Capacity (kg)</th>
      <td mat-cell *matCellDef="let row">{{ row.capacityKg }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
}
