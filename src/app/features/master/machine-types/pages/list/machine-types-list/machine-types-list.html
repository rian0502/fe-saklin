<app-page-header title="Machine Types" subtitle="Manage machine type definitions">
  <a pageHeaderActions mat-flat-button color="primary" routerLink="new">
    <mat-icon>add</mat-icon>
    Add Machine Type
  </a>
</app-page-header>

<div class="machine-types-list__toolbar">
  <app-search-box placeholder="Search machine types..." (searchChange)="onSearchChange($event)" />
</div>

<app-data-table
  [columns]="columns"
  [data]="items()"
  [loading]="loading()"
  [sortState]="sort()"
  (sortChange)="onSortChange($event)"
>
  <ng-template #rowActions let-row>
    <a mat-icon-button [routerLink]="[row.id, 'edit']" aria-label="Edit machine type">
      <mat-icon>edit</mat-icon>
    </a>
    <button
      mat-icon-button
      color="warn"
      type="button"
      aria-label="Delete machine type"
      (click)="deleteMachineType(row)"
    >
      <mat-icon>delete</mat-icon>
    </button>
  </ng-template>
</app-data-table>

@if (!loading() && items().length === 0) {
  <app-empty-state
    icon="category"
    title="No machine types found"
    description="Try adjusting your search, or add a new machine type."
  />
}

<app-paginator [length]="length()" [page]="page()" [perPage]="perPage()" (pageChange)="onPageChange($event)" />
