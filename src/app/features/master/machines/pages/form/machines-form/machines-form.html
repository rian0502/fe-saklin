<app-page-header title="Machine" subtitle="Machine details" />

<form [formGroup]="form" (ngSubmit)="onSubmit()" class="master-form">
  <mat-form-field appearance="outline">
    <mat-label>Code</mat-label>
    <input matInput formControlName="code" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Machine Type ID</mat-label>
    <input matInput type="number" formControlName="machineTypeId" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Outlet ID</mat-label>
    <input matInput type="number" formControlName="outletId" />
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Status</mat-label>
    <input matInput formControlName="status" />
  </mat-form-field>

  <div class="master-form__actions">
    <button mat-button type="button" routerLink="..">Cancel</button>
    <button mat-flat-button color="primary" type="submit">Save</button>
  </div>
</form>
