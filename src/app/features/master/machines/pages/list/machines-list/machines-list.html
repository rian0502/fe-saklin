<app-page-header title="Machines" subtitle="Manage laundry machines across outlets">
  <a pageHeaderActions mat-flat-button color="primary" routerLink="new">
    <mat-icon>add</mat-icon>
    Add Machine
  </a>
</app-page-header>

@if (loading()) {
  <app-loading message="Loading machines..." />
} @else if (items().length === 0) {
  <app-empty-state
    icon="settings_suggest"
    title="No machines yet"
    description="Machines you add will appear here."
  />
} @else {
  <table mat-table [dataSource]="items()">
    <ng-container matColumnDef="code">
      <th mat-header-cell *matHeaderCellDef>Code</th>
      <td mat-cell *matCellDef="let row">{{ row.code }}</td>
    </ng-container>

    <ng-container matColumnDef="machineTypeId">
      <th mat-header-cell *matHeaderCellDef>Machine Type</th>
      <td mat-cell *matCellDef="let row">{{ row.machineTypeId }}</td>
    </ng-container>

    <ng-container matColumnDef="outletId">
      <th mat-header-cell *matHeaderCellDef>Outlet</th>
      <td mat-cell *matCellDef="let row">{{ row.outletId }}</td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">{{ row.status }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
}
